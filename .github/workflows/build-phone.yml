name: Build Carlyle Arrow Phone APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Configura Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configura Android SDK
        uses: android-actions/setup-android@v3

      - name: Installa componenti Android
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configura Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Estrai app telefono
        run: |
          rm -rf project
          mkdir project
          unzip -oq "CarlyleArrow_PhoneCompanion_v1.zip" -d project

      - name: Compila APK telefono
        run: gradle --no-daemon -p project/carlyle_arrow_phone_v1 :app:assembleDebug

      - name: Salva APK telefono
        uses: actions/upload-artifact@v4
        with:
          name: CarlyleArrow-phone-apk
          path: project/carlyle_arrow_phone_v1/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
