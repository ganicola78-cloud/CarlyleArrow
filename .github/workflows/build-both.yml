name: Build Carlyle Arrow Both APKs

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Configura Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configura Android SDK
        uses: android-actions/setup-android@v3

      - name: Installa componenti Android
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configura Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Estrai app orologio
        run: |
          rm -rf watch
          mkdir watch
          unzip -oq "CarlyleArrow_WearOS2_v13_MotoSymbolsSmall.zip" -d watch

      - name: Estrai app telefono
        run: |
          rm -rf phone
          mkdir phone
          unzip -oq "CarlyleArrow_PhoneCompanion_v10_AccessibilityFix.zip" -d phone

      - name: Compila APK orologio
        run: gradle --no-daemon -p watch :app:assembleDebug

      - name: Compila APK telefono
        run: gradle --no-daemon -p phone :app:assembleDebug

      - name: Salva APK orologio
        uses: actions/upload-artifact@v4
        with:
          name: CarlyleArrow-watch-apk
          path: watch/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Salva APK telefono
        uses: actions/upload-artifact@v4
        with:
          name: CarlyleArrow-phone-apk
          path: phone/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
